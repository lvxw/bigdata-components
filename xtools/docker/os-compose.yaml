version: "3.9"

networks:
  os-network:
    name: os-network
    driver: bridge
    ipam:
      config:
        - gateway: 172.20.0.1
          subnet: 172.20.0.0/16

services:
  desktop:
    image: 10.10.52.13:5000/lakehouse/desktop:1.15.0
    extra_hosts:
      - "my-ubuntu:172.30.76.81"
    volumes:
      - /:/mnt/host
      - /mnt/e:/mnt/e
      - /mnt/c:/mnt/c
    privileged: true
    hostname: desktop
    container_name: desktop
    restart: always
    environment:
      KASM_USER: kasm-user
      VNC_PW: password
    networks:
      os-network:
    ports:
      - "6901:6901"
      - "3391:3391"
      - "3350:3350"

  windows:
    image: 10.10.52.13:5000/lakehouse/windows:11
    container_name: windows
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3390:3389/tcp
      - 3390:3389/udp
    networks:
      os-network:
    volumes:
      - /tmp/windows-11:/storage
      - ../dependency/windows-11/shared:/shared
      - ../dependency/windows-11/scripts:/oem
      - ../dependency/windows-11/win11x64_zh.iso:/boot.iso
    restart: always
    stop_grace_period: 2m

  workspaces:
    image: 10.10.52.13:5000/lakehouse/workspaces:1.18.1
    privileged: true
    hostname: workspaces
    container_name: workspaces
    restart: always
    networks:
      os-network:
    ports:
      - "8443:8443"      